<!-- Bootstrap Login Page without Animations -->
<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="row w-100">
    <div class="col-md-6 offset-md-3">
      <div class="card shadow-lg">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">
            <i class="bi bi-person-circle me-2"></i>Login
          </h3>
          <form>
            <div *ngIf="loginError" class="alert alert-danger mb-3">
              {{ loginError }}
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" id="email" placeholder="Enter email" [(ngModel)]="loginobj.email" name="email">
              </div>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" id="password" placeholder="Password" [(ngModel)]="loginobj.contactNo" name="contactNo">
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label" for="rememberMe">
                  <i class="bi bi-check2-square me-1"></i>Remember Me
                </label>
              </div>
              <a href="#" class="text-primary text-decoration-none">
                <i class="bi bi-question-circle me-1"></i>Forgot Password?
              </a>
            </div>
            <div class="d-grid gap-2">
              <button type="button" (click)="onLogin()" class="btn btn-primary btn-block">
                <i class="bi bi-box-arrow-in-right me-1"></i>Login
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
